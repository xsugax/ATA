<!doctype html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ALL TALENTS Agency  Explorer</title>
<link rel="stylesheet" href="assets/styles.css"/>
<style>
.celeb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.celeb-card{cursor:pointer}.celeb-card img{height:260px;object-fit:cover;object-position:top;border-radius:var(--radius-sm)}
.celeb-card:hover{border-color:var(--line);transform:translateY(-3px);box-shadow:var(--shadow-violet)}
.filter-bar{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:20px}
.filter-bar label{min-width:140px}
</style>
</head><body>
<div id="app"></div>
<script type="module">
import { request, nav } from './assets/api.js';
const app = document.getElementById('app');
const avail = a => a==='Open'?'badge-green':a==='Limited'?'badge-amber':'badge-red';

app.innerHTML = nav('explorer') + `
<div class="container">
  <div class="section" style="padding-bottom:4px">
    <div style="font-size:10px;letter-spacing:.45em;color:var(--violet-bright);text-transform:uppercase;margin-bottom:6px">Roster</div>
    <h2 style="font-size:2rem;font-weight:900;letter-spacing:-.025em">100 Elite Icons</h2>
    <p class="muted" style="margin-top:6px">Filter by category, region, availability and price range.</p>
  </div>
  <div class="card section filter-bar" style="padding:18px">
    <label>Category<select id="f-cat"><option value="">All Categories</option><option>Film</option><option>Music</option><option>Sports</option><option>Fashion</option><option>Business</option><option>Influencer</option></select></label>
    <label>Region<select id="f-reg"><option value="">All Regions</option><option>North America</option><option>Europe</option><option>Middle East</option><option>Asia</option><option>Latin America</option><option>Africa</option></select></label>
    <label>Availability<select id="f-avail"><option value="">All</option><option>Open</option><option>Limited</option><option>Booked</option></select></label>
    <label>Max Rate ($K)<input id="f-price" type="number" min="1" max="10000" placeholder="e.g. 500" style="max-width:130px"/></label>
    <button onclick="applyFilters()" style="width:auto;padding:11px 22px;align-self:flex-end" class="primary">Filter</button>
    <button onclick="clearFilters()" style="width:auto;padding:11px 18px;align-self:flex-end">Clear</button>
  </div>
  <div id="count" class="small faint section"></div>
  <div class="celeb-grid section" id="grid">
    ${Array(8).fill('<div class="card skeleton" style="height:380px"></div>').join('')}
  </div>
</div>`;

let all = [];
try {
  const r = await request('/celebrities?minPopularity=0&minDemand=0&maxPrice=99999999');
  all = r.data;
} catch(e) {
  app.innerHTML += '<p class="muted" style="padding:40px 24px">Backend waking  refreshing in 6s</p>';
  setTimeout(()=>location.reload(),6000); throw e;
}

function render(list) {
  document.getElementById('count').textContent = list.length + ' results';
  document.getElementById('grid').innerHTML = list.map(c=>`
    <article class="card celeb-card" onclick="location.href='booking.html?id=${c.id}'">
      <img src="${c.portrait}" alt="${c.name}" onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed='+encodeURIComponent('${c.name}')+'&backgroundColor=1a0533'"/>
      <div style="padding-top:14px">
        <div class="row between" style="margin-bottom:8px;flex-wrap:wrap;gap:5px">
          <span class="badge">${c.category}</span>
          <span class="badge ${avail(c.availability)}">${c.availability}</span>
        </div>
        <h3 style="margin-bottom:4px">${c.name}</h3>
        <div class="small muted" style="margin-bottom:12px">${c.region} &middot; ${c.agency}</div>
        <div class="row between" style="margin-bottom:10px">
          <span class="small faint">Demand</span>
          <span style="font-weight:700;font-size:13px;color:var(--violet-bright)">${c.demandIndex}%</span>
        </div>
        <div class="stat-bar" style="margin-bottom:12px">
          <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${c.demandIndex}%"></div></div>
        </div>
        <div class="row between">
          <span class="small faint">From</span>
          <span style="font-weight:800;color:var(--gold-bright)">$${(c.averageEventRate/1000).toFixed(0)}K</span>
        </div>
      </div>
    </article>`).join('');
}

window.applyFilters = () => {
  const cat = document.getElementById('f-cat').value;
  const reg = document.getElementById('f-reg').value;
  const av  = document.getElementById('f-avail').value;
  const mp  = Number(document.getElementById('f-price').value)*1000||Infinity;
  render(all.filter(c =>
    (!cat || c.category===cat) &&
    (!reg || c.region===reg) &&
    (!av  || c.availability===av) &&
    (c.averageEventRate<=mp)
  ));
};
window.clearFilters = () => {
  ['f-cat','f-reg','f-avail'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-price').value='';
  render(all);
};
render(all);
</script>
</body></html>

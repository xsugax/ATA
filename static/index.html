<!doctype html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ALL TALENTS Agency  Dashboard</title>
<link rel="stylesheet" href="assets/styles.css"/>
<style>.hero-fade{transition:opacity .5s}.hero-fade.out{opacity:0}</style>
</head><body>
<div id="app"></div>
<script type="module">
import { request, nav } from './assets/api.js';
const app = document.getElementById('app');
const avail = a => a==='Open'?'badge-green':a==='Limited'?'badge-amber':'badge-red';

app.innerHTML = nav('home') + `
<div class="container">
  <section class="hero section hero-fade" id="hero"><div class="skeleton" style="height:280px;border-radius:18px"></div></section>
  <section class="grid grid-4 section" id="kpis">
    <div class="card"><div class="skeleton" style="height:92px"></div></div>
    <div class="card"><div class="skeleton" style="height:92px"></div></div>
    <div class="card"><div class="skeleton" style="height:92px"></div></div>
    <div class="card"><div class="skeleton" style="height:92px"></div></div>
  </section>
  <section class="grid grid-3 section" id="feats"></section>
  <section id="trending" class="section"></section>
</div>`;

let payload;
try { payload = await request('/celebrities/featured'); }
catch(e) {
  document.getElementById('hero').innerHTML = `<div class="hero-eyebrow">System</div><h1>Waking Up...</h1><p class="muted" style="margin-top:12px">Backend initializing  refreshing in 6s</p>`;
  setTimeout(()=>location.reload(),6000); throw e;
}

const m = payload.metrics;
document.getElementById('kpis').innerHTML = [
  {label:'Total Bookings',val:m.totalGlobalBookings.toLocaleString(),trend:'+12% QoQ',cls:''},
  {label:'Portfolio Value',val:'$'+(m.managedPortfolioValue/1e6).toFixed(0)+'M',trend:'AUM record',cls:'kpi-gold'},
  {label:'Live Negotiations',val:m.activeNegotiations,trend:'Active pipeline',cls:'kpi-cyan'},
  {label:'Elite Roster',val:m.verifiedCelebrities,trend:'100 verified icons',cls:''},
].map(k=>`<article class="card"><div class="kpi-label">${k.label}</div><div class="kpi ${k.cls}">${k.val}</div><div class="kpi-trend">&#8593; ${k.trend}</div></article>`).join('');

document.getElementById('feats').innerHTML = `
  <article class="card"><div class="feature-icon">&#9824;</div><h3>Invite-Only Black Card</h3><p class="small muted" style="margin-top:8px;line-height:1.7">Private wealth onboarding with full discretion tier compliance and NDA orchestration.</p></article>
  <article class="card card-hot"><div class="feature-icon" style="background:linear-gradient(135deg,rgba(232,121,249,.2),rgba(139,92,246,.12))">&#9889;</div><h3>Auction-Style Bidding</h3><p class="small muted" style="margin-top:8px;line-height:1.7">Live escalation windows for unavailable icons through sovereign bid ladders.</p></article>
  <article class="card card-gold"><div class="feature-icon" style="background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(251,146,60,.1))">&#9670;</div><h3>Back a Legend</h3><p class="small muted" style="margin-top:8px;line-height:1.7">Co-fund celebrity projects  documentaries, galas, fan tours. Top backers get private access.</p><a href="crowdfund.html" class="btn primary" style="margin-top:14px">View Campaigns &#8594;</a></article>`;

try {
  const cf = await request('/crowdfunding');
  document.getElementById('trending').innerHTML = `
    <div class="row between" style="margin-bottom:16px;flex-wrap:wrap;gap:10px"><h2>Trending Campaigns</h2><a href="crowdfund.html" class="btn" style="width:auto;padding:8px 18px">See All &#8594;</a></div>
    <div class="grid grid-3">${cf.data.slice(0,3).map(c=>`
      <article class="card" style="cursor:pointer" onclick="location.href='crowdfund.html'">
        <img src="${c.portrait}" alt="${c.celebrityName}" style="height:180px" onerror="this.style.display='none'"/>
        <div style="padding-top:12px">
          <div class="row between" style="margin-bottom:8px;flex-wrap:wrap;gap:6px"><span class="badge-magenta badge">${c.category}</span><span class="small faint">${c.daysLeft}d left</span></div>
          <h3 style="font-size:.95rem;margin-bottom:8px">${c.title}</h3>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(c.percentFunded,100)}%"></div></div>
          <div class="row between" style="margin-top:8px"><span style="font-weight:800;color:var(--gold-bright)">$${c.raised.toLocaleString()} raised</span><span class="small faint">${c.percentFunded}%</span></div>
        </div>
      </article>`).join('')}</div>`;
} catch(_) {}

const heroEl = document.getElementById('hero');
const heroes = payload.data;
let idx = 0;
function renderHero() {
  const c = heroes[idx];
  heroEl.innerHTML = `
    <div class="hero-eyebrow">Global Featured Profile</div>
    <h1>${c.name}</h1>
    <div class="row wrap" style="gap:8px;margin-top:12px">
      <span class="badge">${c.category}</span>
      <span class="badge ${avail(c.availability)}">${c.availability}</span>
      <span class="badge-cyan badge">${c.region}</span>
      <span class="badge-gold badge">$${(c.averageEventRate/1000).toFixed(0)}K avg</span>
    </div>
    <div class="hero-meta">
      <div class="hero-meta-item"><div class="label">Demand Index</div><div class="value">${c.demandIndex}%</div></div>
      <div class="hero-meta-item"><div class="label">Booking Tier</div><div class="value">${c.bookingTiers[2].type}</div></div>
      <div class="hero-meta-item"><div class="label">Social Reach</div><div class="value">${c.socialReachMillions}M</div></div>
      <div class="hero-meta-item"><div class="label">Brand Partner</div><div class="value">${c.recentBrandAlignment}</div></div>
    </div>
    <div style="margin-top:22px;display:flex;gap:12px;flex-wrap:wrap;position:relative">
      <a href="explorer.html" class="btn primary" style="width:auto;padding:11px 26px">Explore Roster &#8594;</a>
      <a href="booking.html?id=${c.id}" class="btn" style="width:auto;padding:11px 26px">Book Now</a>
    </div>
    <img class="hero-portrait" src="${c.portrait}" alt="${c.name}" onerror="this.remove()"/>`;
}
renderHero();
setInterval(()=>{
  heroEl.classList.add('out');
  setTimeout(()=>{ idx=(idx+1)%heroes.length; renderHero(); heroEl.classList.remove('out'); },500);
},4500);
</script>
</body></html>

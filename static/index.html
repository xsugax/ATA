							<div class='atl-content'><span class='atl-milestone'>Legal Architecture</span><h3 class='atl-title'>Escrow Protocol Established</h3><p class='atl-body'>Introduced the ATA Escrow Standard — all booking payments held in independently audited escrow until engagement confirmation. Zero financial loss to any client in 19 years since inception.</p><div class='atl-tags'><span class='atl-tag'>Escrow</span><span class='atl-tag'>Legal Framework</span><span class='atl-tag'>Risk-Zero</span></div></div>
						</div>
						<div class='atl-entry' onclick="this.classList.toggle('atl-active')">
							<div class='atl-year-col'><span class='atl-year'>2012</span><div class='atl-dot'></div></div>
							<div class='atl-content'><span class='atl-milestone'>Scale</span><h3 class='atl-title'>50-Talent Sovereign Roster</h3><p class='atl-body'>Crossed the 50-talent threshold. Added Asia-Pacific desk in Singapore. First celebrity booking secured through a fully digital NDA-to-payment workflow — zero in-person signatures required.</p><div class='atl-tags'><span class='atl-tag'>Singapore</span><span class='atl-tag'>50 Talents</span><span class='atl-tag'>Digital-First</span></div></div>
						</div>
						<div class='atl-entry' onclick="this.classList.toggle('atl-active')">
							<div class='atl-year-col'><span class='atl-year'>2018</span><div class='atl-dot'></div></div>
							<div class='atl-content'><span class='atl-milestone'>Intelligence</span><h3 class='atl-title'>Market Demand Engine</h3><p class='atl-body'>Launched proprietary demand intelligence platform. Real-time waitlist pressure scores, inquiry velocity tracking, and competitive heat maps gave clients a strategic edge unavailable anywhere else in the industry.</p><div class='atl-tags'><span class='atl-tag'>AI Intelligence</span><span class='atl-tag'>Demand Radar</span><span class='atl-tag'>Competitive Edge</span></div></div>
						</div>
						<div class='atl-entry' onclick="this.classList.toggle('atl-active')">
							<div class='atl-year-col'><span class='atl-year'>2022</span><div class='atl-dot'></div></div>
							<div class='atl-content'><span class='atl-milestone'>Access Architecture</span><h3 class='atl-title'>Crowd Access Protocol</h3><p class='atl-body'>Introduced the Crowd Booking system — the first structured group-access pathway to private celebrity engagements. Democratized access without compromising exclusivity through escrow-backed installment plans.</p><div class='atl-tags'><span class='atl-tag'>Crowd Access</span><span class='atl-tag'>Installments</span><span class='atl-tag'>47 Countries</span></div></div>
						</div>
						<div class='atl-entry' onclick="this.classList.toggle('atl-active')">
							<div class='atl-year-col'><span class='atl-year'>2026</span><div class='atl-dot'></div></div>
							<div class='atl-content'><span class='atl-milestone'>Present</span><h3 class='atl-title'>166 Verified Talents. 47 Countries.</h3><p class='atl-body'>The world's most comprehensive sovereign celebrity access network. Every engagement NDA-protected, escrow-secured, and representative-verified. The standard the industry is measured against.</p><div class='atl-tags'><span class='atl-tag'>166 Talents</span><span class='atl-tag'>$8.4B Portfolio</span><span class='atl-tag'>24/7 Concierge</span></div></div>
						</div>
					</div>
				</div>
			</section>

			<footer class='ata-footer'>
				<div class='af-bar'>
					<div style='display:flex;align-items:center;gap:12px'>
						<div class='brand-mark' style='width:38px;height:38px;font-size:10px;flex-shrink:0'>ATA</div>
						<div>
							<div style='font-size:12px;color:var(--text);letter-spacing:.2em;font-weight:700;text-transform:uppercase;line-height:1.2'>ALL TALENTS Agency</div>
							<div style='font-size:10px;color:var(--muted);letter-spacing:.08em;margin-top:2px'>Private Celebrity Representation</div>
						</div>
					</div>
					<nav class='af-links'>
						<a href='explorer.html'>Explorer</a>
						<a href='crowdbooking.html'>Crowd Access</a>
						<a href='booking.html'>Booking</a>
						<a href='portal.html'>Portal</a>
						<a href='login.html'>Login</a>
					</nav>
				</div>
				<div class='af-legal'>
					<p>© 2026 ALL TALENTS Agency. All rights reserved. Platform access is governed by mutual confidentiality agreements. All talent listings, pricing structures, and representative contacts are proprietary and NDA-protected. Unauthorized reproduction is prohibited.</p>
					<p>By accessing this platform, users confirm they are qualified principals or authorized representatives operating within our client terms of service.</p>
				</div>
			</footer>
		`;

		const panel = document.getElementById('floatMsgPanel');
		const btn = document.getElementById('floatMsgBtn');
		btn.onclick = () => panel.classList.toggle('open');
		document.getElementById('fmpClose').onclick = () => panel.classList.remove('open');

		function setHomeTemplate(mode, celebrityName) {
			const textarea = document.getElementById('homeBody');
			if (mode === 'meet') {
				textarea.value = `How-to-meet request for ${celebrityName}: Please share representation protocol, qualification criteria, expected timeline, and first-step coordination requirements.`;
			} else {
				textarea.value = `Representative message for ${celebrityName}: Requesting callback to discuss strategic fit, event scope, and process.`;
			}
		}

		initTheme();
		initDynamicTheme();
		initNav();
		initScrollReveal();
		loadTicker(); // fire-and-forget — ticker strips load async, never blocks hero

		// Use local static data — no cold-start delay
		const hero = document.getElementById('hero');
		const featured = CELEBRITIES.slice(0, 6);
		featuredCelebrity = { id: featured[0].id, name: featured[0].name };
		document.getElementById('homeTarget').value = `${featured[0].name} (${featured[0].id})`;
		document.getElementById('homeType').value = 'meet';
		setHomeTemplate('meet', featured[0].name);

		// -- Cinematic Rotating Hero --------------------------
		let heroIdx = 0;
		let heroTimer = null;
		let heroProg = null;
		const HERO_INTERVAL = 7000;

		function buildHeroHTML() {
			const fmtP = p => p >= 1e6 ? `$${(p/1e6).toFixed(1)}M` : `$${Math.round(p/1000)}K`;
			const slides = featured.map((c, i) => `
				<div class='hero-slide${i === 0 ? ' hs-active' : ''}' data-idx='${i}'>
					<p class='eyebrow'>Featured Profile - ${i + 1} of ${featured.length} &nbsp;-&nbsp; ${c.category}</p>
					<h1 class='headline hero-headline'>${c.name}</h1>
					${c.eliteSignal ? `<p style='font-size:13px;line-height:1.55;color:var(--text-2);font-style:italic;margin:0 0 10px;border-left:2px solid var(--accent);padding-left:12px'>${c.eliteSignal}</p>` : ''}
					<div style='display:flex;gap:18px;flex-wrap:wrap;margin:8px 0 10px'>
						${c.netWorth ? `<span class='small'><span class='muted'>Net Worth</span> <strong style='color:var(--accent-text)'>${c.netWorth}</strong></span>` : ''}
						<span class='small'><span class='muted'>Global Reach</span> <strong style='color:var(--accent-text)'>${c.socialReachMillions}M</strong></span>
						<span class='small'><span class='muted'>Private Access</span> <strong style='color:var(--accent-text)'>${fmtP(c.startingPrice)}</strong></span>
						<span class='small'><span class='muted'>Agency</span> <strong style='color:var(--accent-text)'>${c.agencyRepresentation}</strong></span>
					</div>
					<p class='small muted'>${c.availability === 'Open' ? '- Accepting qualified outreach now.' : c.availability === 'Limited' ? '- Limited access windows - act within 48h.' : '- Waitlist only - secure your slot.'}</p>
					<div style='margin-top:12px;display:flex;gap:10px;flex-wrap:wrap'>
						<a href='explorer.html'><button class='primary' style='width:auto;padding:10px 22px'>- Access Private Profile -</button></a>
						<a href='booking.html?id=${c.id}'><button class='secondary' style='width:auto;padding:10px 22px'>Start Private Engagement</button></a>
					</div>
				</div>
			`).join('');
			// Sizer: invisible copy of first slide keeps track height stable during transitions
			const sizer = `<div class='hero-slide hero-slide-sizer' aria-hidden='true'>
					<p class='eyebrow'>Featured Profile - 1 of ${featured.length} - ${featured[0].category}</p>
					<h1 class='headline'>${featured[0].name}</h1>
					${featured[0].eliteSignal ? `<p style='font-size:13px;line-height:1.55;color:var(--text-2);font-style:italic;margin:0 0 10px;border-left:2px solid var(--accent);padding-left:12px'>${featured[0].eliteSignal}</p>` : ''}
					<div style='display:flex;gap:18px;flex-wrap:wrap;margin:8px 0 10px'>
						${featured[0].netWorth ? `<span class='small'><span class='muted'>Net Worth</span> <strong style='color:var(--accent-text)'>${featured[0].netWorth}</strong></span>` : ''}
						<span class='small'><span class='muted'>Global Reach</span> <strong style='color:var(--accent-text)'>${featured[0].socialReachMillions}M</strong></span>
						<span class='small'><span class='muted'>Private Access</span> <strong style='color:var(--accent-text)'>$${(featured[0].startingPrice/1e6).toFixed(1)}M</strong></span>
						<span class='small'><span class='muted'>Agency</span> <strong style='color:var(--accent-text)'>${featured[0].agencyRepresentation}</strong></span>
					</div>
					<p class='small muted'>- Accepting qualified outreach now.</p>
					<div style='margin-top:12px;display:flex;gap:10px;flex-wrap:wrap'>
						<button class='primary' style='width:auto;padding:10px 22px'>- Access Private Profile -</button>
						<button class='secondary' style='width:auto;padding:10px 22px'>Start Private Engagement</button>
					</div>
				</div>`;
			const dots = featured.map((_, i) => `<div class='hero-dot${i === 0 ? ' hd-active' : ''}' data-dot='${i}'></div>`).join('');
			return `<div class='hero-stage' id='heroStage'><div class='hero-slides-track'>${slides}${sizer}</div></div><div class='hero-dots'>${dots}</div>`;
		}

		hero.innerHTML = buildHeroHTML();

		function goToSlide(newIdx) {
			const slides = hero.querySelectorAll('.hero-slide:not(.hero-slide-sizer)');
			const dots = hero.querySelectorAll('.hero-dot');
			const exitIdx = heroIdx; // capture before mutation
			slides[exitIdx].classList.remove('hs-active');
			slides[exitIdx].classList.add('hs-exit');
			setTimeout(() => slides[exitIdx]?.classList.remove('hs-exit'), 1100);
			heroIdx = (newIdx + featured.length) % featured.length;
			slides[heroIdx].classList.add('hs-active');
			dots.forEach((d, i) => d.classList.toggle('hd-active', i === heroIdx));
			featuredCelebrity = { id: featured[heroIdx].id, name: featured[heroIdx].name };
			document.getElementById('homeTarget').value = `${featured[heroIdx].name} (${featured[heroIdx].id})`;
			setHomeTemplate(document.getElementById('homeType').value, featured[heroIdx].name);

			// progress bar reset
			if (heroProg) { heroProg.style.transition = 'none'; heroProg.style.width = '0%'; }
			setTimeout(() => {
				if (heroProg) { heroProg.style.transition = `width ${HERO_INTERVAL}ms linear`; heroProg.style.width = '100%'; }
			}, 50);
		}

		// Add progress bar
		const stage = document.getElementById('heroStage');
		const progBar = document.createElement('div');
		progBar.className = 'hero-progress';
		progBar.style.width = '0%';
		stage.appendChild(progBar);
		heroProg = progBar;
		setTimeout(() => { progBar.style.transition = `width ${HERO_INTERVAL}ms linear`; progBar.style.width = '100%'; }, 100);

		hero.querySelectorAll('.hero-dot').forEach((dot) => {
			dot.onclick = () => { clearInterval(heroTimer); goToSlide(Number(dot.dataset.dot)); startHeroTimer(); };
		});

		function startHeroTimer() {
			heroTimer = setInterval(() => goToSlide(heroIdx + 1), HERO_INTERVAL);
		}
		startHeroTimer();
		stage.addEventListener('mouseenter', () => { clearInterval(heroTimer); if (heroProg) heroProg.style.animationPlayState = 'paused'; });
		stage.addEventListener('mouseleave', () => { startHeroTimer(); if (heroProg) { heroProg.style.transition = `width ${HERO_INTERVAL}ms linear`; heroProg.style.width = '100%'; } });

		// KPIs derived from local data + async API enrichment
		const kpiData = {
			totalGlobalBookings: 4820,
			managedPortfolioValue: 8400000000,
			activeNegotiations: 73,
			verifiedCelebrities: CELEBRITIES.length,
		};
		const renderKPIs = (m) => {
			document.getElementById('kpis').innerHTML = [
				['Total Global Bookings', m.totalGlobalBookings.toLocaleString()],
				['Managed Portfolio Value', (() => { const v = m.managedPortfolioValue; return v >= 1e12 ? `$${(v/1e12).toFixed(2)}T` : v >= 1e9 ? `$${(v/1e9).toFixed(1)}B` : `$${(v/1e6).toFixed(0)}M`; })()],
				['Active Negotiations', m.activeNegotiations.toLocaleString()],
				['Verified Celebrities', m.verifiedCelebrities],
			].map(([name, value]) => `<div class='card'><div class='small muted'>${name}</div><div class='kpi'>${value}</div></div>`).join('');
		};
		renderKPIs(kpiData);

		// -- Populate "Direct Access Windows" strip ----------
		const fmtPH = p => p >= 1e6 ? `$${(p/1e6).toFixed(1)}M` : `$${Math.round(p/1000)}K`;
		const windowGrid = document.getElementById('windowGrid');
		if (windowGrid) {
			windowGrid.innerHTML = featured.slice(0, 4).map(c => `
				<div class='window-card' onclick="window.location.href='explorer.html'" style='display:flex;flex-direction:column;gap:6px'>
					<div class='wc-avail ${c.availability === "Open" ? "wa-open" : "wa-limited"}'>- ${c.availability === "Open" ? "OPEN WINDOW" : c.availability === "Waitlist" ? "WAITLIST" : "LIMITED WINDOW"}</div>
					<div class='wc-name'>${c.name}</div>
					<div class='wc-meta'>${c.category} - ${c.region}</div>
					<div style='display:flex;gap:10px;flex-wrap:wrap;margin-top:2px'>
						${c.netWorth ? `<span style='font-size:10px;color:var(--text-2)'>${c.netWorth} est. worth</span>` : ''}
						<span style='font-size:10px;color:var(--text-2)'>${c.socialReachMillions}M reach</span>
					</div>
					<div class='wc-price'>Private access from ${fmtPH(c.startingPrice)}</div>
				</div>
			`).join('');
		}

		document.getElementById('bpCelebrity').innerHTML = featured
			.map((item) => `<option value='${item.id}'>${item.name} - $${item.startingPrice.toLocaleString()}</option>`)
			.join('');

		// -- Crowd Teaser: fully static, always present immediately ----------
		const CROWD_TEASER = [
			{ eventType: 'Exclusive Concert', eventTitle: 'Private Stage — VIP Ring Access', name: 'Beyoncé', city: 'Dubai', available: 8,  slots: 60, claimed: 52, pricePerSlot: 3200 },
			{ eventType: 'Brand Activation',  eventTitle: 'Signature Keynote Front Row',    name: 'Elon Musk',  city: 'Las Vegas', available: 14, slots: 80, claimed: 66, pricePerSlot: 4500 },
			{ eventType: 'Film Premiere',      eventTitle: 'Red Carpet Access Window',       name: 'Zendaya',    city: 'Cannes',    available: 4,  slots: 40, claimed: 36, pricePerSlot: 2800 },
		];
		const teaserGrid = document.getElementById('crowdTeaserGrid');
		if (teaserGrid) {
			const fmtP = p => p >= 1000 ? `$${(p/1000).toFixed(1)}K` : `$${p}`;
			teaserGrid.innerHTML = CROWD_TEASER.map(ev => {
				const soldPct = Math.min(100, Math.round((ev.claimed / ev.slots) * 100));
				const urgency = ev.available <= 5 ? '#C03030' : ev.available <= 12 ? '#B87020' : '#1E7040';
				return `
				<div class='crowd-event-card' onclick="window.location.href='crowdbooking.html'" style='cursor:pointer;padding:16px'>
					<div class='ce-event-type'>${ev.eventType}</div>
					<div class='ce-title' style='font-size:13px;margin:6px 0 4px'>${ev.eventTitle}</div>
					<div class='ce-meta' style='font-size:11px;margin-bottom:8px'>${ev.name} · ${ev.city}</div>
					<div class='ce-slot-bar' style='height:5px;background:rgba(255,255,255,.08);border-radius:3px;margin-bottom:6px'>
						<div class='ce-slot-fill' style='height:100%;border-radius:3px;width:${soldPct}%;background:${urgency};transition:width .8s ease'></div>
					</div>
					<div style='display:flex;justify-content:space-between;align-items:center'>
						<span style='font-size:10px;color:${urgency};font-weight:600'>${ev.available} slot${ev.available === 1 ? '' : 's'} left</span>
						<span style='font-size:11px;color:var(--accent);font-weight:600'>${fmtP(ev.pricePerSlot)}/person</span>
					</div>
				</div>`;
			}).join('');
		}

		document.getElementById('homeType').addEventListener('change', (e) => {
			if (!featuredCelebrity.name) return;
			setHomeTemplate(e.target.value, featuredCelebrity.name);
		});

		document.getElementById('homeSend').onclick = async () => {
			const thread = document.getElementById('chatThread');
			const status = document.getElementById('homeStatus');
			const fullName = document.getElementById('homeName').value.trim();
			const org = document.getElementById('homeOrg').value.trim();
			const body = document.getElementById('homeBody').value.trim();
			const mode = document.getElementById('homeType').value;

			if (!featuredCelebrity.id) { status.textContent = 'Profile not ready. Refresh.'; return; }
			if (!fullName || !org || !body) { status.textContent = 'Fill name, organization, and message.'; return; }

			addBubble(thread, 'user', body);
			document.getElementById('homeBody').value = '';
			status.textContent = '';
			const typingBubble = addBubble(thread, 'desk', '', true);

			try {
				const result = await request('/messages/send', {
					method: 'POST',
					body: JSON.stringify({
						celebrityId: featuredCelebrity.id,
						priority: mode === 'meet' ? 'Urgent' : 'Priority',
						body: `[${mode === 'meet' ? 'How to Meet Request' : 'Representative Message'}]\nClient: ${fullName}\nOrganization: ${org}\nCelebrity: ${featuredCelebrity.name}\n\n${body}`,
					}),
				});
				await new Promise(r => setTimeout(r, 1100));
				typingBubble.remove();
				const replyBubble = addBubble(thread, 'desk', '');
				await typeText(replyBubble.querySelector('.cb-msg'), result.acknowledgement.body, 20);
			} catch (error) {
				typingBubble.remove();
				addBubble(thread, 'desk', error.message + ' - login first to send.');
			}
		};

		document.getElementById('bpGenerate').onclick = async () => {
			const out = document.getElementById('bpOut');
			try {
				const response = await request('/intelligence/blueprint', {
					method: 'POST',
					body: JSON.stringify({
						celebrityId: document.getElementById('bpCelebrity').value,
						objective: document.getElementById('bpObjective').value,
						audienceType: document.getElementById('bpAudience').value,
						region: document.getElementById('bpRegion').value,
						budget: Number(document.getElementById('bpBudget').value || 0),
						timelineDays: Number(document.getElementById('bpTimeline').value || 30),
					}),
				});
				out.innerHTML = `
					<p class='small'><b>Blueprint:</b> ${response.blueprintId}</p>
					<p class='small'><b>Recommendation:</b> ${response.strategy.recommendation}</p>
					<p class='small'><b>Scores:</b> Fit ${response.scores.fitScore} - Pressure ${response.scores.pressureScore} - Budget ${response.scores.budgetAlignment} - Exclusivity ${response.scores.exclusivityIndex}</p>
					<p class='small'><b>Execution Plan:</b> ${response.executionPlan.join(' - ')}</p>
				`;
			} catch (error) {
				out.textContent = error.message + ' (login first for AI strategy generation)';
			}
		};
	</script>
</body>
</html>

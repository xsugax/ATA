<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALL TALENTS / Agency — Dashboard</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    .hero-carousel { transition: opacity 0.6s ease; }
    .hero-carousel.fade { opacity: 0; }
    .feature-card { cursor: default; }
    .demand-badge {
      position: absolute;
      top: 12px; right: 12px;
      font-size: 10px; font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .portrait-wrap { position: relative; }
    .hero-portrait {
      width: 120px; height: 120px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top;
      border: 2px solid rgba(212,175,55,0.4);
      background: #111;
      flex-shrink: 0;
    }
    @media(max-width:600px) {
      .hero-portrait { width: 80px; height: 80px; }
      .hero-name-row { flex-direction: column; gap: 14px; align-items: flex-start !important; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { request, nav } from './assets/api.js';

    const app = document.getElementById('app');
    app.innerHTML = `
      ${nav('home')}
      <div class="container">
        <section class="glass hero hero-carousel section" id="hero">
          <div class="skeleton" style="height:240px;border-radius:14px;"></div>
        </section>
        <section class="grid grid-4 section" id="kpis">
          ${[0,1,2,3].map(()=>`<div class="card"><div class="skeleton" style="height:72px;"></div></div>`).join('')}
        </section>
        <section class="grid grid-3 section" id="features"></section>
      </div>`;

    let payload;
    try {
      payload = await request('/celebrities/featured');
    } catch(e) {
      document.getElementById('hero').innerHTML = `<p class="muted" style="padding:20px">Backend waking up — refreshing in 5s…</p>`;
      setTimeout(() => location.reload(), 5000);
      throw e;
    }

    // KPIs
    const m = payload.metrics;
    const kpiData = [
      { label: 'Total Global Bookings', value: m.totalGlobalBookings.toLocaleString(), trend: '+12% this quarter' },
      { label: 'Managed Portfolio Value', value: `$${(m.managedPortfolioValue/1000000).toFixed(0)}M`, trend: 'AUM milestone' },
      { label: 'Active Negotiations', value: m.activeNegotiations.toLocaleString(), trend: 'Live right now' },
      { label: 'Verified Celebrities', value: m.verifiedCelebrities.toLocaleString(), trend: '100 elites on-roster' },
    ];
    document.getElementById('kpis').innerHTML = kpiData.map(k => `
      <article class="card">
        <div class="kpi-label">${k.label}</div>
        <div class="kpi">${k.value}</div>
        <div class="kpi-trend">↑ ${k.trend}</div>
      </article>`).join('');

    // Feature cards
    document.getElementById('features').innerHTML = `
      <article class="card feature-card">
        <div class="feature-icon">♠</div>
        <h3>Invite-Only Black Card</h3>
        <p class="muted small" style="margin-top:8px">Private wealth onboarding with discretion and compliance orchestration.</p>
      </article>
      <article class="card feature-card">
        <div class="feature-icon">⚡</div>
        <h3>Auction-Style Bidding</h3>
        <p class="muted small" style="margin-top:8px">Escalation windows for unavailable icons through sovereign bid ladders.</p>
      </article>
      <article class="card feature-card">
        <div class="feature-icon">◆</div>
        <h3>Request an Unlisted Icon</h3>
        <p class="muted small" style="margin-top:8px">Private representation channel for off-market talent access.</p>
      </article>`;

    // Hero carousel
    let index = 0;
    const heroes = payload.data;
    const heroEl = document.getElementById('hero');

    function renderHero(fade = false) {
      const c = heroes[index];
      const availColor = c.availability === 'Open' ? 'badge-green' : c.availability === 'Limited' ? 'badge-amber' : 'badge-red';
      if (fade) heroEl.classList.add('fade');
      setTimeout(() => {
        heroEl.innerHTML = `
          <div class="hero-eyebrow">Global Featured Profile</div>
          <div class="row hero-name-row" style="justify-content:space-between;align-items:center;gap:20px;">
            <div style="flex:1">
              <h1>${c.name}</h1>
              <div class="row wrap" style="margin-top:10px;gap:8px;">
                <span class="badge">${c.category}</span>
                <span class="badge ${availColor}">${c.availability}</span>
                <span class="badge-blue badge">${c.region}</span>
              </div>
            </div>
            <img class="hero-portrait" src="${c.portrait}" alt="${c.name}" onerror="this.style.display='none'" />
          </div>
          <div class="hero-meta">
            <div class="hero-meta-item"><div class="label">Booking Tier</div><div class="value">${c.bookingTiers[2].type}</div></div>
            <div class="hero-meta-item"><div class="label">Starting Rate</div><div class="value">$${c.averageEventRate.toLocaleString()}</div></div>
            <div class="hero-meta-item"><div class="label">Demand Index</div><div class="value">${c.demandIndex}%</div></div>
            <div class="hero-meta-item"><div class="label">Brand Alignment</div><div class="value">${c.recentBrandAlignment}</div></div>
          </div>
          <a href="explorer.html" class="btn primary" style="display:inline-flex;width:auto;margin-top:22px;padding:11px 26px;">
            Explore Full Roster →
          </a>`;
        heroEl.classList.remove('fade');
      }, fade ? 350 : 0);
    }

    renderHero();
    setInterval(() => {
      index = (index + 1) % heroes.length;
      renderHero(true);
    }, 4000);
  </script>
</body>
</html>
</html>

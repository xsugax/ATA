<!doctype html>
<html lang="en">
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <meta http-equiv='Content-Security-Policy' content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.pravatar.cc; connect-src 'self' http://localhost:4100 https://ata-h0yo.onrender.com; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
  <meta name='referrer' content='no-referrer'>
  <title>Celebrity Crowd Events | VIP Access Tickets - ALL TALENTS Agency</title>
  <meta name="description" content="Join exclusive celebrity events as part of a curated group. VIP concerts, galas, and private appearances. Flexible payment plans available.">
  <meta name="robots" content="index, follow">
  <meta name="author" content="ALL TALENTS Agency">
  <link rel='icon' href='/assets/favicon.svg' type='image/svg+xml'>
  <link rel='shortcut icon' href='/assets/favicon.svg'>
  <link rel='stylesheet' href='assets/styles.css'>
  <script>(function(){var t=localStorage.getItem('ata_theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();</script>
</head>
<body>
  <div class='container' id='app'></div>

  <div id='crowdModalBack' class='crowd-modal-back'>
    <div class='crowd-modal' id='crowdModalContent' style='position:relative'></div>
  </div>

  <script type='module'>
    import { request, nav, loadTicker, initTheme, initNav, initScrollReveal, buildCryptoPaymentHTML, initCryptoWidget } from './assets/app.js';

    (async () => {

    const app = document.getElementById('app');
    const modalBack = document.getElementById('crowdModalBack');
    const modalContent = document.getElementById('crowdModalContent');
    const urlParam = new URLSearchParams(window.location.search).get('celeb');

    modalBack.addEventListener('click', (e) => { if (e.target === modalBack) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    function closeModal() { modalBack.classList.remove('cm-open'); }

    app.innerHTML = `
      ${nav('crowd')}
      <section class='crowd-hero section'>
        <div class='crowd-hero-label'>Live Crowd Events</div>
        <h2>Join a Group.<br><span>Access an Icon.</span></h2>
        <p class='lead' style='max-width:620px;margin:10px 0 0'>Private celebrity access — without the private price tag. Join a curated group of qualified clients and attend the <em>same real event</em> as your chosen celebrity. Concerts, premieres, paddocks, brand studios. Real access. Shared investment.</p>
        <div class='crowd-how'>
          <div class='crowd-how-step'>
            <p class='ch-num'>Step 01</p>
            <h4>Choose Your Event</h4>
            <p>Browse vetted upcoming celebrity events with confirmed access inclusion. Each event has limited slots.</p>
          </div>
          <div class='crowd-how-step'>
            <p class='ch-num'>Step 02</p>
            <h4>Select Your Plan</h4>
            <p>Pay in full for a 5% discount, or spread across 3 or 6 monthly installments. All escrow-secured.</p>
          </div>
          <div class='crowd-how-step'>
            <p class='ch-num'>Step 03</p>
            <h4>Claim Your Slot</h4>
            <p>Lock your spot. Receive your NDA-protected slot code and event credentials 14 days before the event.</p>
          </div>
          <div class='crowd-how-step'>
            <p class='ch-num'>Step 04</p>
            <h4>Attend & Experience</h4>
            <p>Show up. Be in the room. Your slot guarantees the listed access items — photo, signed item, backstage or VIP tier.</p>
          </div>
        </div>
      </section>

      <section class='card section stack' style='padding:14px 18px'>
        <div style='display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px'>
          <div>
            <p class='eyebrow'>Upcoming Verified Events</p>
            <p class='small muted' style='margin-top:2px'>All events NDA-protected · Escrow-secured · Slot codes issued 14 days prior</p>
          </div>
          <div style='display:flex;gap:8px;flex-wrap:wrap'>
            <select id='filterCat' style='width:auto;padding:8px 12px;font-size:11px'>
              <option value='All'>All Categories</option>
              <option value='Music'>Music</option>
              <option value='Sports'>Sports</option>
              <option value='Film'>Film</option>
              <option value='Business'>Business</option>
              <option value='Influencer'>Influencer</option>
              <option value='Fashion'>Fashion</option>
            </select>
            <select id='filterPrice' style='width:auto;padding:8px 12px;font-size:11px'>
              <option value='0'>Any Price</option>
              <option value='2000'>Under $2,000</option>
              <option value='3500'>Under $3,500</option>
              <option value='5000'>Under $5,000</option>
            </select>
          </div>
        </div>
      </section>

      <section class='grid g3 section' id='eventsGrid'>
        ${[1,2,3,4,5,6].map(() => `<div class='card' style='height:340px;opacity:.4'></div>`).join('')}
      </section>

      <section class='card section' style='text-align:center;padding:32px'>
        <p class='eyebrow'>Prefer Exclusive Private Access?</p>
        <h3 style='margin:8px 0 8px'>Book a Sole Private Meeting</h3>
        <p class='small muted' style='max-width:480px;margin:0 auto 16px'>Crowd Access is designed for maximum value. If your engagement requires total privacy, a sole event, or sovereign-tier presence — explore private bookings.</p>
        <a href='explorer.html'><button class='primary' style='width:auto;padding:12px 28px;font-size:11px;letter-spacing:.08em;text-transform:uppercase'>Open Explorer →</button></a>
      </section>
    `;

    await loadTicker();
    initTheme();
    initNav();
    initScrollReveal();

    // ── Static events — always visible instantly ───────────────────────
    const STATIC_EVENTS = [
      {
        id:'evt-001', celebId:'beyonce',
        eventType:'Private Concert + Meet',
        eventTitle:'An Evening with Beyoncé — Renaissance II Residency',
        city:'Dubai', date:'2026-06-14', name:'Beyoncé',
        category:'Music', slots:40, claimed:33, soldPct:82,
        pricePerSlot:3400,
        installments:[{months:3,monthly:1140},{months:6,monthly:590}],
        includes:['VIP Floor Access','Backstage Meet & Greet','Signed Album','Professional Photograph','Post-show Cocktail Reception']
      },
      {
        id:'evt-002', celebId:'roger-federer',
        eventType:'Private Clinic + Gala Dinner',
        eventTitle:'Federer Foundation Intimate Tennis Clinic',
        city:'Geneva', date:'2026-05-22', name:'Roger Federer',
        category:'Sports', slots:24, claimed:18, soldPct:75,
        pricePerSlot:2900,
        installments:[{months:3,monthly:975},{months:6,monthly:500}],
        includes:['On-court Session (45 min)','Personal Coaching Tip','Signed Racket Frame','Gala Dinner Seat','Official Credential & Gift Set']
      },
      {
        id:'evt-003', celebId:'zendaya',
        eventType:'Film Premiere + After-party',
        eventTitle:'Zendaya — Cannes Film Festival Exclusive',
        city:'Cannes', date:'2026-05-17', name:'Zendaya',
        category:'Film', slots:30, claimed:27, soldPct:90,
        pricePerSlot:3600,
        installments:[{months:3,monthly:1210},{months:6,monthly:622}],
        includes:['Red Carpet Access','Signed Premiere Poster','Photo Opportunity','After-party Invitation','Official Lanyard & Badge']
      },
      {
        id:'evt-004', celebId:'drake',
        eventType:'Studio Session Access',
        eventTitle:'Drake — OVO Sound Exclusive Studio Night',
        city:'Toronto', date:'2026-08-09', name:'Drake',
        category:'Music', slots:20, claimed:11, soldPct:55,
        pricePerSlot:2500,
        installments:[{months:3,monthly:840},{months:6,monthly:432}],
        includes:['Studio Floor Access','Brief Personal Greeting','Signed Merch Pack','Behind-the-scenes Tour','NDA-protected Environment Access']
      },
      {
        id:'evt-005', celebId:'serena-williams',
        eventType:'Private Keynote + Dinner',
        eventTitle:'Serena Williams — Leaders Summit New York',
        city:'New York', date:'2026-09-25', name:'Serena Williams',
        category:'Business', slots:35, claimed:14, soldPct:40,
        pricePerSlot:2200,
        installments:[{months:3,monthly:740},{months:6,monthly:382}],
        includes:['Front-row Keynote Seat','Private Q&A Access (10 min)','Signed Book','Executive Networking Dinner','VIP Credentials Pack']
      },
      {
        id:'evt-006', celebId:'neymar',
        eventType:'Training Ground Access',
        eventTitle:'Neymar Jr. — Foundation Training Open Day',
        city:'Riyadh', date:'2026-07-19', name:'Neymar Jr.',
        category:'Sports', slots:28, claimed:20, soldPct:71,
        pricePerSlot:1850,
        installments:[{months:3,monthly:622},{months:6,monthly:319}],
        includes:['Training Ground Visit','On-pitch Photo Session','Signed Match Jersey','Post-session Meet','Foundation Certificate']
      }
    ];

    let allEvents = STATIC_EVENTS;

    // Try to refresh from API silently in background (doesn't block the page)
    request('/crowd-events').then(res => {
      if (res?.data?.length) {
        allEvents = res.data;
        allEvents.forEach(ev => { if (!planState[ev.id]) planState[ev.id] = 'full'; });
        renderEvents(getFiltered());
      }
    }).catch(() => { /* static data remains — no error shown */ });

    const planState = {};
    allEvents.forEach(ev => { planState[ev.id] = 'full'; });

    function fmtDate(d) {
      const dt = new Date(d + 'T00:00:00');
      return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    function fmtPrice(p) { return '$' + p.toLocaleString(); }

    function renderEvents(events) {
      if (!events.length) {
        document.getElementById('eventsGrid').innerHTML = `<div class='card' style='grid-column:1/-1;padding:40px;text-align:center'><p class='muted'>No events match your filters.</p></div>`;
        return;
      }
      document.getElementById('eventsGrid').innerHTML = events.map(ev => {
        const avail = ev.slots - ev.claimed;
        const pct = ev.soldPct;
        const isFull = avail <= 0;
        const fullPrice = Math.round(ev.pricePerSlot * 0.95);
        const plan3 = ev.installments?.find(i => i.months === 3);
        const plan6 = ev.installments?.find(i => i.months === 6);
        return `
          <div class='crowd-event-card' id='card-${ev.id}'>
            <div class='ce-header'>
              <div class='ce-event-type'>${ev.eventType}</div>
              <div class='ce-title'>${ev.eventTitle}</div>
              <div class='ce-meta'>${ev.city} · ${fmtDate(ev.date)} · ${ev.name}</div>
            </div>
            <div class='ce-body'>
              <div class='ce-slots'>
                <div class='ce-slots-top'>
                  <span class='ce-slots-label'>Slots Claimed</span>
                  <span class='ce-slots-count'>${isFull ? '— SOLD OUT' : `${avail} of ${ev.slots} remaining`}</span>
                </div>
                <div class='ce-slot-bar'><div class='ce-slot-fill${pct >= 80 ? " sf-critical" : ""}' style='width:${pct}%'></div></div>
              </div>
              <div style='margin-bottom:10px'>
                <div class='ce-price-row'>
                  <span class='ce-price-main' id='disp-price-${ev.id}'>${fmtPrice(fullPrice)}</span>
                  <span class='ce-price-sub' id='disp-sub-${ev.id}'>full pay (5% off)</span>
                </div>
                <p class='small muted' style='margin:3px 0 8px;font-size:10px'>Regular price ${fmtPrice(ev.pricePerSlot)} per slot</p>
                <div class='ce-plans'>
                  <span class='ce-plan-pill cp-full cp-sel' data-ev='${ev.id}' data-plan='full'>Pay in Full · ${fmtPrice(fullPrice)}</span>
                  ${plan3 ? `<span class='ce-plan-pill' data-ev='${ev.id}' data-plan='3-pay'>3× ${fmtPrice(plan3.monthly)}/mo</span>` : ''}
                  ${plan6 ? `<span class='ce-plan-pill' data-ev='${ev.id}' data-plan='6-pay'>6× ${fmtPrice(plan6.monthly)}/mo</span>` : ''}
                </div>
              </div>
              <div class='ce-includes'>
                ${ev.includes.map(i => `<span>${i}</span>`).join('')}
              </div>
              <button class='ce-join-btn' data-ev='${ev.id}' ${isFull ? 'disabled' : ''}>${isFull ? '— Fully Claimed' : 'Claim My Slot →'}</button>
            </div>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.ce-plan-pill').forEach(pill => {
        pill.onclick = () => {
          const evId = pill.dataset.ev;
          const plan = pill.dataset.plan;
          planState[evId] = plan;
          document.querySelectorAll(`.ce-plan-pill[data-ev="${evId}"]`).forEach(p => p.classList.remove('cp-sel'));
          pill.classList.add('cp-sel');
          const ev = allEvents.find(e => e.id === evId);
          if (!ev) return;
          const pp = document.getElementById('disp-price-' + evId);
          const ps = document.getElementById('disp-sub-' + evId);
          if (plan === 'full') { pp.textContent = fmtPrice(Math.round(ev.pricePerSlot * 0.95)); ps.textContent = 'full pay (5% off)'; }
          else {
            const m = ev.installments?.find(i => i.months === (plan === '3-pay' ? 3 : 6));
            if (m) { pp.textContent = fmtPrice(m.monthly) + '/mo'; ps.textContent = `over ${m.months} months`; }
          }
        };
      });

      document.querySelectorAll('.ce-join-btn').forEach(btn => {
        btn.onclick = () => {
          const evId = btn.dataset.ev;
          const ev = allEvents.find(e => e.id === evId);
          const plan = planState[evId] || 'full';
          openConfirmModal(ev, plan);
        };
      });

      if (urlParam) {
        const found = allEvents.find(e => e.celebId === urlParam);
        if (found) {
          const el = document.getElementById('card-' + found.id);
          if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.style.borderColor = 'rgba(196,155,46,.6)'; }
        }
      }
    }

    async function openConfirmModal(ev, plan) {
      const isFullPay = plan === 'full';
      const displayAmt = isFullPay
        ? Math.round(ev.pricePerSlot * 0.95)
        : ev.installments?.find(i => i.months === (plan === '3-pay' ? 3 : 6))?.monthly ?? ev.pricePerSlot;
      const planLabel = isFullPay ? 'Full Payment (5% discount)' : plan === '3-pay' ? '3-Month Installments' : '6-Month Installments';

      modalContent.innerHTML = `
        <button onclick="document.getElementById('crowdModalBack').classList.remove('cm-open')" style='position:absolute;top:14px;right:16px;background:var(--bg-alt);border:1px solid var(--line);color:var(--muted);font-size:11px;padding:6px 14px;border-radius:8px;cursor:pointer;width:auto;letter-spacing:.06em;text-transform:uppercase;z-index:1'>Close</button>
        <p class='eyebrow'>Claim Your Slot</p>
        <h3 style='margin:8px 0 4px;font-size:19px;color:var(--text)'>${ev.eventTitle}</h3>
        <p class='small muted'>${ev.city} · ${new Date(ev.date + 'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})} · ${ev.name}</p>
        <div style='margin:16px 0;padding:14px;background:var(--accent-soft);border:1px solid rgba(196,155,46,.3);border-radius:10px'>
          <div style='display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px'>
            <span class='small muted'>Payment Plan</span>
            <strong style='color:var(--accent-text);font-size:13px'>${planLabel}</strong>
          </div>
          <div style='display:flex;justify-content:space-between;align-items:baseline'>
            <span class='small muted'>${isFullPay ? 'Total Due Today' : 'First Installment'}</span>
            <strong style='color:var(--text);font-size:22px;font-weight:900'>$${displayAmt.toLocaleString()}</strong>
          </div>
        </div>
        <div style='margin-bottom:16px'>
          <p class='small muted' style='margin-bottom:8px;font-size:10px;letter-spacing:.08em;text-transform:uppercase'>What's Included</p>
          <div class='ce-includes' style='background:var(--bg-alt);border-color:var(--line)'>${ev.includes.map(i => `<span style='color:var(--text-2)'>${i}</span>`).join('')}</div>
        </div>
        <div style='margin-bottom:16px'>
          <p class='eyebrow' style='margin-bottom:10px;font-size:10px'>Select Payment Method</p>
          <div id='cm-pay-wrap'></div>
        </div>
        <p class='small muted' style='font-size:10.5px;line-height:1.55;margin-bottom:14px;padding:10px;background:var(--bg-alt);border-radius:8px;border:1px solid var(--line)'>By claiming this slot you agree to a standard NDA and confirm your registered client identity. Credentials are issued 14 days before the event.</p>
        <button id='cmConfirmBtn' class='primary' style='border-radius:8px;padding:16px;font-size:12px;font-weight:900;letter-spacing:.1em;text-transform:uppercase'>Confirm & Secure My Slot →</button>
        <p id='cmStatus' class='small muted' style='text-align:center;margin-top:8px'></p>
      `;
      modalBack.classList.add('cm-open');

      document.getElementById('cm-pay-wrap').innerHTML = buildCryptoPaymentHTML('cm');
      const cmCryptoWidget = initCryptoWidget('cm');

      document.getElementById('cmConfirmBtn').onclick = async () => {
        const btn = document.getElementById('cmConfirmBtn');
        const status = document.getElementById('cmStatus');
        btn.disabled = true; btn.textContent = 'Securing slot…';
        const payMethod = cmCryptoWidget.getMethod();
        try {
          const res = await request(`/crowd-events/${ev.id}/join`, { method: 'POST', body: JSON.stringify({ plan, paymentMethod: payMethod }) });
          const payLabel = payMethod === 'wire' ? 'Wire Transfer' : payMethod.toUpperCase();
          modalContent.innerHTML = `
            <div style='text-align:center;padding:10px 0'>
              <div style='font-size:48px;margin-bottom:12px'>✓</div>
              <p class='eyebrow'>Slot Secured</p>
              <h3 style='margin:8px 0 4px;color:var(--text)'>${ev.eventTitle}</h3>
              <p class='small muted' style='margin-bottom:14px'>${ev.city} · ${ev.name}</p>
              <div class='crowd-slot-code'>${res.booking.slotCode}</div>
              <p class='small muted' style='font-size:11px;margin-bottom:6px'>${res.message}</p>
              <div style='display:inline-block;margin:8px 0 10px;padding:7px 18px;background:var(--accent-soft);border:1px solid rgba(196,155,46,.3);border-radius:8px;font-size:11px;color:var(--accent-text);font-weight:700'>
                Payment via ${payLabel}
              </div>
              <p class='small muted' style='font-size:10px;opacity:.7'>Event credentials will be delivered 14 days before the event. Keep your slot code safe.</p>
              <button onclick="document.getElementById('crowdModalBack').classList.remove('cm-open')" class='secondary' style='margin-top:18px;width:auto;padding:10px 24px;font-size:11px'>Done</button>
            </div>
          `;
          const idx = allEvents.findIndex(e => e.id === ev.id);
          if (idx >= 0) allEvents[idx].claimed++;
          renderEvents(getFiltered());
        } catch(err) {
          btn.disabled = false; btn.textContent = 'Confirm & Secure My Slot →';
          status.textContent = err.message || 'Error — please log in first.';
          status.style.color = 'var(--danger)';
        }
      };
    }

    function getFiltered() {
      const cat = document.getElementById('filterCat')?.value || 'All';
      const maxP = parseInt(document.getElementById('filterPrice')?.value || '0');
      return allEvents.filter(ev => {
        if (cat !== 'All' && ev.category !== cat) return false;
        if (maxP > 0 && ev.pricePerSlot > maxP) return false;
        return true;
      });
    }

    renderEvents(allEvents);
    document.getElementById('filterCat').onchange = () => renderEvents(getFiltered());
    document.getElementById('filterPrice').onchange = () => renderEvents(getFiltered());

    })(); // end async IIFE
  </script>
</body>
</html>

 <meta http-equiv='Content-Security-Policy' content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.smartsuppchat.com https://*.smartsupp.com https://*.smartsuppchat.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.pravatar.cc https://commons.wikimedia.org https://upload.wikimedia.org https://static.smartsupp.com https://image.smartsupp.com https://image.smartsuppchat.com; connect-src 'self' http://localhost:4000 https://ata-h0yo.onrender.com https://www.smartsupp.com https://app.smartsupp.com wss://app.smartsupp.com https://www.smartsuppchat.com; font-src 'self'; frame-src https://www.smartsupp.com https://app.smartsupp.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
	<meta name='referrer' content='no-referrer'>
	<title>Sovereign Client Portal | All Talents Agency</title>
	<meta name="robots" content="noindex, nofollow">
	<link rel='stylesheet' href='assets/styles.css'>
	<link rel='icon' href='/assets/favicon.svg' type='image/svg+xml'>
	<link rel='shortcut icon' href='/assets/favicon.svg'>
	<script>(function(){var t=localStorage.getItem('ata_theme')||'sovereign';document.documentElement.setAttribute('data-theme',t)})();</script>
</head>
<body>
	<div class='container' id='app'></div>
	<script type='module'>
		import { request, nav, currentUser, loadTicker, initTheme, initNav, initScrollReveal, initDynamicTheme } from './assets/app.js';
		const app = document.getElementById('app');
		app.innerHTML = `${nav('portal')}<section id='p' class='section'></section>`;
		await loadTicker();
		initTheme();
		initNav();
		initScrollReveal();
		initDynamicTheme();
		try {
			const user = currentUser();
			if (!user) {
				document.getElementById('p').innerHTML = `<div class='card' style='max-width:560px;margin:0 auto;padding:40px 32px;text-align:center'>
					<p class='eyebrow' style='color:var(--danger)'>Authentication Required</p>
					<h2 style='margin:12px 0 8px'>Client Portal Access</h2>
					<p class='small muted' style='margin-bottom:20px'>Log in to view bookings, representative messages, and client standing.</p>
					<div class='card' style='padding:14px;margin-bottom:20px;text-align:left'>
						<p class='small muted' style='margin:0 0 8px'>Demo credentials</p>
						<p class='small'><b>Client:</b> client@aurelux.com / Client@123</p>
						<p class='small'><b>Manager:</b> manager@aurelux.com / Manager@123</p>
					</div>
					<a href='login.html'><button class='primary' style='width:auto;padding:14px 32px;font-size:12px;letter-spacing:.08em;text-transform:uppercase'>Go to Secure Login →</button></a>
				</div>`;
				return;
			}
			const [d, standing] = await Promise.all([
				request('/portal/overview'),
				request('/portal/standing').catch(() => null),
			]);
			document.getElementById('p').innerHTML = `
				<div class='card stack'>
					<p class='eyebrow'>Sovereign Command Center</p>
					<h2>All Talents Client Portal</h2>
					<p class='lead'>Welcome, ${user.name || user.email}. Your session is active.</p>
					<p class='small muted'>Membership Tier: ${d.membershipTier}</p>
				</div>
				<div class='card section stack'>
					<p class='eyebrow'>Active Booking Files</p>
					<h3>Contract & Engagement Tracker</h3>
					${d.bookings.length === 0 ? `<p class='small muted'>No active bookings. Initiate one from Explorer or Booking.</p>` : d.bookings.map(b => `
						<div class='card stack' style='margin-top:8px'>
							<div style='display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px'>
								<div><p class='eyebrow'>Contract ${b.contractId}</p><h4 style='margin:4px 0'>${b.celebrityName}</h4></div>
								<span class='badge'>${b.status}</span>
							</div>
							<p class='small muted'>${b.eventType} - ${b.date || 'Date TBD'} - ${b.location}</p>
						</div>
					`).join('')}
				</div>
				<div class='card section stack'>
					<p class='eyebrow'>Representative Communications</p>
					<h3>Client Message Archive</h3>
					${d.messages.map(m => `<p class='small'><b>${m.from}:</b> ${m.body}</p>`).join('') || '<p class="small muted">No messages currently available.</p>'}
				</div>
			`;
		} catch (e) {
			document.getElementById('p').innerHTML = `<div class='card'>${e.message}. Login first.</div>`;
		}
	</script>

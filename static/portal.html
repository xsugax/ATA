<!doctype html>
<html lang="en">
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <meta http-equiv='Content-Security-Policy' content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.smartsuppchat.com https://*.smartsupp.com https://*.smartsuppchat.com https://*.smartsuppcdn.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.pravatar.cc https://commons.wikimedia.org https://upload.wikimedia.org https://static.smartsupp.com https://image.smartsupp.com https://image.smartsuppchat.com https://*.smartsuppcdn.com; connect-src 'self' http://localhost:4000 https://ata-h0yo.onrender.com https://www.smartsupp.com https://app.smartsupp.com wss://app.smartsupp.com https://www.smartsuppchat.com https://*.smartsuppcdn.com; font-src 'self'; frame-src https://www.smartsupp.com https://app.smartsupp.com https://*.smartsuppcdn.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
  <meta name='referrer' content='no-referrer'>
  <title>Sovereign Client Portal | All Talents Agency</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel='stylesheet' href='assets/styles.css'>
  <link rel='icon' href='/assets/favicon.svg' type='image/svg+xml'>
  <link rel='shortcut icon' href='/assets/favicon.svg'>
</head>
<body>
  <div class='container' id='app'></div>

  <script type='module'>
    import { request, nav, currentUser, loadTicker, initTheme, initNav, initScrollReveal, initDynamicTheme, formatPrice, displayPrice } from './assets/app.js';
    import { CELEBRITIES } from './assets/celebrities-data.js';

    const app = document.getElementById('app');
    const user = currentUser();

    // Always render nav + content — never blank
    app.innerHTML = `${nav('portal')}<section id='p' class='section'></section>`;

    initTheme();
    initNav();
    initScrollReveal();
    initDynamicTheme();
    loadTicker().catch(() => {});

    const p = document.getElementById('p');

    if (!user) {
      // Not logged in — show landing with demo credentials
      p.innerHTML = `<div class='card' style='max-width:600px;margin:40px auto;padding:32px;text-align:center'>
        <div style='font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:12px'>Sovereign Client Portal</div>
        <h2 style='font-size:28px;margin:0 0 8px'>Command Center</h2>
        <p class='small muted' style='margin-bottom:20px;line-height:1.6'>Track active bookings, view representative messages, and manage your client standing — all in one sovereign dashboard.</p>
        <div style='padding:16px;background:var(--bg-alt);border:1px solid var(--line);border-radius:10px;margin-bottom:20px;text-align:left'>
          <p style='font-size:11px;color:var(--muted);margin:0 0 10px;letter-spacing:.06em;text-transform:uppercase;font-weight:700'>Demo Access Credentials</p>
          <p class='small' style='margin:0 0 4px'><b style='color:var(--accent)'>Client:</b> client@aurelux.com / Client@123</p>
          <p class='small' style='margin:0'><b style='color:var(--accent)'>Manager:</b> manager@aurelux.com / Manager@123</p>
        </div>
        <a href='login.html'><button class='primary' style='width:auto;padding:14px 36px;font-size:12px;letter-spacing:.08em;text-transform:uppercase'>Go to Secure Login →</button></a>
        <p class='small muted' style='margin-top:14px'>Your portal session will be active after authentication.</p>
      </div>`;
    } else {
      // Logged in — render from local data so it always shows
      const displayBookings = [
        { contractId: 'ATA-2026-001', celebrityName: 'Beyoncé', status: 'Active Negotiation', eventType: 'Private Gala Performance', date: '2026-09-15', location: 'Monaco Yacht Club' },
        { contractId: 'ATA-2026-002', celebrityName: 'Taylor Swift', status: 'Qualification Review', eventType: 'Corporate Keynote', date: '2026-10-02', location: 'New York, NY' },
      ];
      const displayMessages = [
        { from: 'Representation Desk', body: 'Your booking request for Beyoncé has been received. A dedicated representative will be assigned within 48 hours.' },
        { from: 'Client Services', body: 'NDA documents for engagement ATA-2026-001 are ready for your review in the secure document vault.' },
      ];

      // Try API enrichment but don't block rendering
      const renderPortal = (bookings, messages, tier) => {
        p.innerHTML = `
          <div class='card' style='margin-bottom:18px'>
            <p class='eyebrow'>Sovereign Command Center</p>
            <h2 style='margin:6px 0 4px'>Client Portal</h2>
            <p class='lead'>Welcome, ${user.name || user.email}. Your session is active.</p>
            <p class='small muted'>Membership Tier: <strong style='color:var(--accent)'>${tier || 'Standard'}</strong> · Client since ${new Date().getFullYear()}</p>
          </div>
          <div class='card' style='margin-bottom:18px'>
            <p class='eyebrow'>Active Booking Files</p>
            <h3 style='margin:6px 0 12px;font-size:18px'>Contract & Engagement Tracker</h3>
            ${bookings.length === 0 ? `<p class='small muted'>No active bookings. <a href='explorer.html' style='color:var(--accent)'>Browse talents</a> to start a booking.</p>` : bookings.map(b => `
              <div class='card' style='padding:14px;margin-bottom:8px'>
                <div style='display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px'>
                  <div>
                    <p class='eyebrow' style='margin:0'>${b.contractId}</p>
                    <h4 style='margin:4px 0;font-size:15px'>${b.celebrityName}</h4>
                  </div>
                  <span class='badge'>${b.status}</span>
                </div>
                <p class='small muted' style='margin:6px 0 0'>${b.eventType} · ${b.date || 'Date TBD'} · ${b.location}</p>
              </div>
            `).join('')}
          </div>
          <div class='card'>
            <p class='eyebrow'>Representative Communications</p>
            <h3 style='margin:6px 0 12px;font-size:18px'>Message Archive</h3>
            ${messages.length === 0 ? '<p class="small muted">No messages yet. Initiate a booking to begin correspondence.</p>' : messages.map(m => `
              <div style='padding:10px 0;border-bottom:1px solid var(--line-soft)'>
                <p class='small'><b style='color:var(--accent)'>${m.from}:</b> ${m.body}</p>
              </div>
            `).join('')}
          </div>
        `;
      };

      // Render immediately with local data
      renderPortal(displayBookings, displayMessages, 'Standard');

      // Try enriching from API (non-blocking)
      request('/portal/overview').then(d => {
        if (d) renderPortal(d.bookings || displayBookings, d.messages || displayMessages, d.membershipTier || 'Standard');
      }).catch(() => {});
    }
  </script>

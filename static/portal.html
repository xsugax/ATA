<!doctype html>
<html lang="en">
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <meta http-equiv='Content-Security-Policy' content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.smartsuppchat.com https://*.smartsupp.com https://*.smartsuppchat.com https://*.smartsuppcdn.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.pravatar.cc https://commons.wikimedia.org https://upload.wikimedia.org https://static.smartsupp.com https://image.smartsupp.com https://image.smartsuppchat.com https://*.smartsuppcdn.com; connect-src 'self' http://localhost:4000 https://ata-h0yo.onrender.com https://www.smartsupp.com https://app.smartsupp.com wss://app.smartsupp.com wss://websocket-visitors.smartsupp.com https://www.smartsuppchat.com https://*.smartsuppcdn.com; font-src 'self'; frame-src https://www.smartsupp.com https://app.smartsupp.com https://*.smartsuppcdn.com https://*.smartsuppchat.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
  <meta name='referrer' content='no-referrer'>
  <title>Sovereign Client Portal | All Talents Agency</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel='stylesheet' href='assets/styles.css'>
  <link rel='icon' href='/assets/favicon.svg' type='image/svg+xml'>
  <link rel='shortcut icon' href='/assets/favicon.svg'>
</head>
<body>
  <div class='container' id='app'></div>

<!-- Smartsupp Live Chat — loaded BEFORE module script so it always works -->
<script type="text/javascript">
var _smartsupp = _smartsupp || {};
_smartsupp.key = '97229f7ac536a4dc96013560ce8188410b721c28';
window.smartsupp||(function(d) {
  var s,c,o=smartsupp=function(){ o._.push(arguments)};o._=[];
  s=d.getElementsByTagName('script')[0];c=d.createElement('script');
  c.type='text/javascript';c.charset='utf-8';c.async=true;
  c.src='https://www.smartsuppchat.com/loader.js?';s.parentNode.insertBefore(c,s);
})(document);
</script>
<noscript>Powered by <a href="https://www.smartsupp.com" target="_blank">Smartsupp</a></noscript>

  <script type='module'>
    import { request, nav, currentUser, loadTicker, initTheme, initNav, initScrollReveal, initDynamicTheme, formatPrice, displayPrice } from './assets/app.js';
    import { CELEBRITIES } from './assets/celebrities-data.js';

    const app = document.getElementById('app');
    const user = currentUser();

    // Always render nav + content — never blank
    app.innerHTML = `${nav('portal')}<section id='p' class='section'></section>`;

    initTheme();
    initNav();
    initScrollReveal();
    initDynamicTheme();
    loadTicker().catch(() => {});

    const p = document.getElementById('p');

    if (!user) {
      // Not logged in — show landing with demo credentials
      p.innerHTML = `<div class='card' style='max-width:600px;margin:40px auto;padding:32px;text-align:center'>
        <div style='font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:12px'>Sovereign Client Portal</div>
        <h2 style='font-size:28px;margin:0 0 8px'>Command Center</h2>
        <p class='small muted' style='margin-bottom:20px;line-height:1.6'>Track active bookings, view representative messages, and manage your client standing — all in one sovereign dashboard.</p>
        <div style='padding:16px;background:var(--bg-alt);border:1px solid var(--line);border-radius:10px;margin-bottom:20px;text-align:left'>
          <p style='font-size:11px;color:var(--muted);margin:0 0 10px;letter-spacing:.06em;text-transform:uppercase;font-weight:700'>Demo Access Credentials</p>
          <p class='small' style='margin:0 0 4px'><b style='color:var(--accent)'>Client:</b> client@aurelux.com / Client@123</p>
          <p class='small' style='margin:0'><b style='color:var(--accent)'>Manager:</b> manager@aurelux.com / Manager@123</p>
        </div>
        <a href='login.html'><button class='primary' style='width:auto;padding:14px 36px;font-size:12px;letter-spacing:.08em;text-transform:uppercase'>Go to Secure Login →</button></a>
        <p class='small muted' style='margin-top:14px'>Your portal session will be active after authentication.</p>
      </div>`;
    } else {
      // Show real roster talents as portal landing content
      const topTalents = CELEBRITIES.slice(0, 8);
      const fmtP = p => p >= 1e6 ? `$${(p/1e6).toFixed(1)}M` : `$${Math.round(p/1000)}K`;

      const renderPortal = (bookings, messages, tier, talents) => {
        p.innerHTML = `
          <div class='card' style='margin-bottom:18px'>
            <p class='eyebrow'>Sovereign Command Center</p>
            <h2 style='margin:6px 0 4px'>Client Portal</h2>
            <p class='lead'>Welcome, ${user.name || user.email}. Your session is active.</p>
            <p class='small muted'>Membership Tier: <strong style='color:var(--accent)'>${tier || 'Standard'}</strong> · ${CELEBRITIES.length} verified talents on roster · Client since ${new Date().getFullYear()}</p>
          </div>
          <div class='card' style='margin-bottom:18px'>
            <p class='eyebrow'>Roster Overview</p>
            <h3 style='margin:6px 0 12px;font-size:18px'>${CELEBRITIES.length} Verified Talents Available</h3>
            <div style='display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px'>
              ${(talents || topTalents).map(c => `
                <a href='talent.html?id=${c.id}' style='text-decoration:none;color:inherit;display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);border-radius:8px;transition:border-color .2s' onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor=''">
                  <img src='${c.portrait}' alt='' style='width:44px;height:44px;border-radius:50%;object-fit:cover;border:none;flex-shrink:0'>
                  <div style='min-width:0'>
                    <div style='font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis'>${c.name}</div>
                    <div style='font-size:10px;color:var(--muted)'>${c.category} · ${fmtP(c.startingPrice)}+</div>
                  </div>
                </a>
              `).join('')}
            </div>
            <div style='margin-top:12px;text-align:center'>
              <a href='explorer.html'><button class='secondary' style='width:auto;padding:10px 20px;font-size:11px'>Browse Full Roster →</button></a>
              <a href='booking.html'><button class='primary' style='width:auto;padding:10px 20px;font-size:11px;margin-left:8px'>Initiate Engagement →</button></a>
            </div>
          </div>
          <div class='card' style='margin-bottom:18px'>
            <p class='eyebrow'>Active Booking Files</p>
            <h3 style='margin:6px 0 12px;font-size:18px'>Contract & Engagement Tracker</h3>
            ${(!bookings || bookings.length === 0) ? `<p class='small muted'>No active bookings yet. <a href='explorer.html' style='color:var(--accent)'>Browse talents</a> to start a booking.</p>` : bookings.map(b => `
              <div class='card' style='padding:14px;margin-bottom:8px'>
                <div style='display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px'>
                  <div>
                    <p class='eyebrow' style='margin:0'>${b.contractId}</p>
                    <h4 style='margin:4px 0;font-size:15px'>${b.celebrityName}</h4>
                  </div>
                  <span class='badge'>${b.status}</span>
                </div>
                <p class='small muted' style='margin:6px 0 0'>${b.eventType} · ${b.date || 'Date TBD'} · ${b.location}</p>
              </div>
            `).join('')}
          </div>
          <div class='card'>
            <p class='eyebrow'>Representative Communications</p>
            <h3 style='margin:6px 0 12px;font-size:18px'>Message Archive</h3>
            ${(!messages || messages.length === 0) ? '<p class="small muted">No messages yet. Initiate a booking to begin correspondence.</p>' : messages.map(m => `
              <div style='padding:10px 0;border-bottom:1px solid var(--line-soft)'>
                <p class='small'><b style='color:var(--accent)'>${m.from}:</b> ${m.body}</p>
              </div>
            `).join('')}
          </div>
        `;
      };

      // Render immediately with local roster data (always visible, no API dependency)
      renderPortal(null, null, 'Standard', topTalents);

      // Try enriching from API (non-blocking — never blocks the portal UI)
      request('/portal/overview').then(d => {
        if (d) renderPortal(d.bookings || [], d.messages || [], d.membershipTier || 'Standard', topTalents);
      }).catch(() => {});
    }
  </script>
</body>
</html>

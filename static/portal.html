<!doctype html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ALL TALENTS Agency  Client Portal</title>
<link rel="stylesheet" href="assets/styles.css"/>
</head><body>
<div id="app"></div>
<script type="module">
import { request, nav, token, user } from './assets/api.js';
const app = document.getElementById('app');

if (!token()) {
  document.body.innerHTML = nav('portal') + `<div class="container" style="text-align:center;padding-top:60px"><h2>Access Required</h2><p class="muted" style="margin-top:10px">Please log in to access your portal.</p><a href="login.html" class="btn primary" style="margin-top:20px;width:auto;padding:12px 28px">Login &#8594;</a></div>`;
} else {
  const u = user();
  app.innerHTML = nav('portal') + `
<div class="container">
  <div class="section">
    <div style="font-size:10px;letter-spacing:.45em;color:var(--violet-bright);text-transform:uppercase;margin-bottom:6px">Sovereign Portal</div>
    <div class="row between" style="flex-wrap:wrap;gap:12px">
      <h2 style="font-size:2rem;font-weight:900;letter-spacing:-.025em">Welcome back${u?', '+u.name.split(' ')[0]:''}</h2>
      <div class="row" style="gap:8px">
        <span class="badge ${u&&u.role==='admin'?'badge-magenta':u&&u.role==='manager'?'badge-gold':'badge-cyan'}">${u?u.role:'client'}</span>
        <button onclick="logout()" style="width:auto;padding:7px 16px">Logout</button>
      </div>
    </div>
  </div>
  <div class="grid grid-3 section" id="stats">
    <div class="card skeleton" style="height:100px"></div>
    <div class="card skeleton" style="height:100px"></div>
    <div class="card skeleton" style="height:100px"></div>
  </div>
  <div class="grid grid-2 section" id="panels">
    <div class="card"><h3 style="margin-bottom:14px">My Bookings</h3><div id="bookings-list"><div class="skeleton" style="height:200px"></div></div></div>
    <div class="card"><h3 style="margin-bottom:14px">Messages</h3><div id="messages-list"><div class="skeleton" style="height:200px"></div></div><div style="margin-top:14px;display:flex;gap:8px"><input id="msg-input" placeholder="Type a message..." style="flex:1"/><button onclick="sendMsg()" style="width:auto;padding:11px 16px">Send</button></div></div>
  </div>
</div>`;

  try {
    const overview = await request('/portal/overview');
    const { bookingStats, recentBookings, messages } = overview;
    document.getElementById('stats').innerHTML = [
      {label:'Total Bookings',val:bookingStats.total,cls:''},
      {label:'Confirmed',val:bookingStats.confirmed,cls:'kpi-cyan'},
      {label:'Total Value',val:'$'+(bookingStats.totalValue/1000).toFixed(0)+'K',cls:'kpi-gold'},
    ].map(k=>`<article class="card"><div class="kpi-label">${k.label}</div><div class="kpi ${k.cls}" style="font-size:1.8rem">${k.val}</div></article>`).join('');

    document.getElementById('bookings-list').innerHTML = recentBookings.length
      ? '<table class="table"><thead><tr><th>Celebrity</th><th>Event</th><th>Status</th><th>Value</th></tr></thead><tbody>' +
        recentBookings.map(b=>`<tr><td>${b.celebrity||b.celebrityId}</td><td>${b.eventType}</td><td><span class="badge ${b.status==='Confirmed'?'badge-green':b.status==='Pending'?'badge-amber':'badge-cyan'}">${b.status}</span></td><td class="gold">$${(b.finalRate/1000).toFixed(0)}K</td></tr>`).join('') +
        '</tbody></table>'
      : '<p class="small faint">No bookings yet. <a href="booking.html" style="color:var(--violet-bright)">Book now &#8594;</a></p>';

    document.getElementById('messages-list').innerHTML = messages.length
      ? messages.slice(-5).reverse().map(m=>`<div style="padding:9px 0;border-bottom:1px solid var(--line-dim)"><span class="small faint">${m.from||'System'}</span><p class="small" style="margin-top:3px">${m.text}</p></div>`).join('')
      : '<p class="small faint">No messages yet.</p>';
  } catch(e) {
    document.getElementById('stats').innerHTML = '<p class="small faint" style="grid-column:1/-1">Portal data unavailable  backend may be sleeping.</p>';
  }

  window.sendMsg = async () => {
    const txt = document.getElementById('msg-input').value.trim();
    if (!txt) return;
    try {
      await request('/portal/message',{method:'POST',body:JSON.stringify({text:txt})});
      document.getElementById('msg-input').value='';
      const li = document.getElementById('messages-list');
      li.insertAdjacentHTML('afterbegin',`<div style="padding:9px 0;border-bottom:1px solid var(--line-dim)"><span class="small faint">You</span><p class="small" style="margin-top:3px">${txt}</p></div>`);
    } catch(_) {}
  };
  window.logout = () => { localStorage.removeItem('aurelux_token'); localStorage.removeItem('aurelux_user'); location.href='login.html'; };
}
</script>
</body></html>

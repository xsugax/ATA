<!doctype html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ALL TALENTS Agency  Booking Engine</title>
<link rel="stylesheet" href="assets/styles.css"/>
</head><body>
<div id="app"></div>
<script type="module">
import { request, nav, token } from './assets/api.js';
const app = document.getElementById('app');
const avail = a => a==='Open'?'badge-green':a==='Limited'?'badge-amber':'badge-red';

app.innerHTML = nav('') + `
<div class="container">
  <div class="section" style="padding-bottom:4px">
    <div style="font-size:10px;letter-spacing:.45em;color:var(--violet-bright);text-transform:uppercase;margin-bottom:6px">Sovereign Engine</div>
    <h2 style="font-size:2rem;font-weight:900;letter-spacing:-.025em">Booking Request</h2>
  </div>
  <div class="grid grid-2 section">
    <div id="left-panel">
      <div class="card section" id="select-card">
        <h3 style="margin-bottom:14px">Select Celebrity</h3>
        <label>Search Roster<input id="search-input" type="text" placeholder="Type a name..." style="margin-top:6px"/></label>
        <div id="search-results" style="margin-top:10px;max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:8px"></div>
      </div>
      <div class="card section" id="tier-card" style="display:none">
        <h3 style="margin-bottom:14px">Select Tier</h3>
        <div id="tier-list"></div>
      </div>
    </div>
    <div id="right-panel">
      <div class="card" id="profile-card" style="display:none"></div>
      <form class="card section" id="booking-form" style="display:none">
        <h3 style="margin-bottom:18px">Event Details</h3>
        <div class="grid" style="gap:14px">
          <label>Event Type<select id="event-type"><option>Private Gala</option><option>Corporate Keynote</option><option>Brand Endorsement</option><option>Festival Appearance</option><option>Award Show</option><option>Virtual Appearance</option></select></label>
          <label>Event Date<input id="event-date" type="date" required/></label>
          <label>Location / City<input id="event-loc" type="text" placeholder="e.g. Dubai, UAE" required/></label>
          <label>Budget Range<select id="budget"><option>$50K$100K</option><option>$100K$250K</option><option>$250K$500K</option><option>$500K$1M</option><option>$1M+</option></select></label>
          <label>Special Requirements<textarea id="special" rows="3" placeholder="NDA, security detail, rider..."></textarea></label>
        </div>
        <button type="submit" class="primary" style="margin-top:20px" id="submit-btn">Submit Inquiry &#8594;</button>
      </form>
      <div id="status-card" style="display:none" class="card section">
        <h3 style="margin-bottom:16px">Booking Status</h3>
        <div id="status-steps"></div>
      </div>
    </div>
  </div>
</div>`;

let celebrities = [], selected = null, selectedTier = null;

try {
  const r = await request('/celebrities?minPopularity=0&minDemand=0&maxPrice=99999999');
  celebrities = r.data;
} catch(e) {
  setTimeout(()=>location.reload(),6000); throw e;
}

// Pre-select from URL
const urlId = new URLSearchParams(location.search).get('id');
if (urlId) {
  const found = celebrities.find(c=>c.id===urlId||String(c.id)===urlId);
  if (found) selectCeleb(found);
}

const search = document.getElementById('search-input');
const results = document.getElementById('search-results');

function renderSearch(q) {
  const list = (q ? celebrities.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())) : celebrities).slice(0,12);
  results.innerHTML = list.map(c=>`
    <div onclick="selectCeleb(celebById(${c.id}))" style="display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;border:1px solid var(--line-dim);cursor:pointer;transition:all .15s" onmouseover="this.style.background='rgba(139,92,246,.1)'" onmouseout="this.style.background=''">
      <img src="${c.portrait}" style="width:40px;height:48px;object-fit:cover;object-position:top;border-radius:8px" onerror="this.style.display='none'"/>
      <div>
        <div style="font-weight:700;font-size:13px">${c.name}</div>
        <div class="small faint">${c.category} &middot; ${c.availability}</div>
      </div>
      <span class="badge ${avail(c.availability)}" style="margin-left:auto">${c.availability}</span>
    </div>`).join('');
}
renderSearch('');
search.oninput = () => renderSearch(search.value);

window.celebById = id => celebrities.find(c=>c.id===id||Number(c.id)===id);

window.selectCeleb = (c) => {
  if (!c) return;
  selected = c;
  document.getElementById('profile-card').style.display='';
  document.getElementById('profile-card').innerHTML = `
    <div style="display:flex;gap:16px;align-items:flex-start">
      <img src="${c.portrait}" style="width:80px;height:96px;object-fit:cover;object-position:top;border-radius:12px;flex-shrink:0" onerror="this.style.display='none'"/>
      <div style="flex:1">
        <div class="row between" style="flex-wrap:wrap;gap:6px;margin-bottom:8px">
          <span class="badge">${c.category}</span>
          <span class="badge ${avail(c.availability)}">${c.availability}</span>
        </div>
        <h3>${c.name}</h3>
        <div class="small muted">${c.region} &middot; ${c.agency}</div>
        <div style="margin-top:10px;font-size:12px;color:var(--plat-faint)">Social: ${c.socialReachMillions}M &middot; Demand: ${c.demandIndex}%</div>
      </div>
    </div>`;
  document.getElementById('tier-card').style.display='';
  document.getElementById('booking-form').style.display='';
  document.getElementById('tier-list').innerHTML = c.bookingTiers.map((t,i)=>`
    <div class="tier-reward ${i===0?'selected':''}" data-idx="${i}" onclick="selectTier(this,${i})">
      <div class="tier-amount">$${(t.baseRate/1000).toFixed(0)}K</div>
      <div class="tier-name">${t.type}</div>
      <div class="tier-perks">${t.includes.join(' &middot; ')}</div>
    </div>`).join('');
  selectedTier = 0;
};

window.selectTier = (el,i) => {
  document.querySelectorAll('.tier-reward').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected'); selectedTier = i;
};

document.getElementById('booking-form').onsubmit = async (e) => {
  e.preventDefault();
  if (!selected) return;
  if (!token()) { alert('Please log in first'); location.href='login.html'; return; }
  const btn = document.getElementById('submit-btn');
  btn.textContent='Processing...'; btn.disabled=true;
  try {
    await request('/bookings/initiate',{
      method:'POST',
      body:JSON.stringify({
        celebrityId: selected.id,
        tierIndex: selectedTier,
        eventType: document.getElementById('event-type').value,
        eventDate: document.getElementById('event-date').value,
        location: document.getElementById('event-loc').value,
        budget: document.getElementById('budget').value,
        specialRequirements: document.getElementById('special').value,
      })
    });
    document.getElementById('status-card').style.display='';
    document.getElementById('status-steps').innerHTML = `
      <div class="status-step done">Identity & intent verified</div>
      <div class="status-step done">Celebrity profile matched</div>
      <div class="status-step done">Inquiry submitted to negotiation queue</div>
      <div class="status-step active">Awaiting talent office response (2448h)</div>
      <div class="status-step">Contract & NDA preparation</div>
      <div class="status-step">Booking confirmation & deposit</div>`;
    btn.textContent='Inquiry Submitted';
  } catch(err) {
    btn.textContent='Submit Inquiry '; btn.disabled=false;
    alert('Error: '+err.message);
  }
};
</script>
</body></html>

<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURELUX Sovereign - Booking Engine</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="container" id="app"></div>
  <script type="module">
    import { request, nav } from './assets/api.js';

    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const stages = ['Inquiry Received','Under Representation Review','Terms Negotiation','Contract Finalized','Escrow Secured','Confirmed'];

    const app = document.getElementById('app');
    app.innerHTML = `${nav('explorer')}
      <section class="grid grid-2 section">
        <article class="card" id="left"></article>
        <article class="card" id="right"></article>
      </section>`;

    if (!id) {
      document.getElementById('left').innerHTML = '<h3>No celebrity selected</h3><p>Open booking from Explorer.</p>';
      throw new Error('missing id');
    }

    const celeb = await request('/celebrities/' + id);

    const left = document.getElementById('left');
    left.innerHTML = `
      <h2>Initiate Sovereign Booking · ${celeb.name}</h2>
      <div class="grid top-space">
        <input id="eventType" value="Gala" placeholder="Event type" />
        <input id="date" type="date" />
        <input id="location" value="Dubai" placeholder="Location" />
        <select id="securityLevel">${celeb.securityTiers.map(s => `<option>${s}</option>`).join('')}</select>
        <label class="row"><input id="ndaRequired" type="checkbox" checked style="width:auto" /> NDA required</label>
        <label>Dynamic pricing <input id="adjust" type="range" min="-15" max="50" value="0" /></label>
        <textarea id="rider" rows="3">Private lounge + fortified arrival corridor</textarea>
      </div>
      <div class="grid grid-3 top-space">
        <div class="card"><div class="small muted">Live Quote</div><div class="kpi" id="quote">-</div></div>
        <div class="card"><div class="small muted">Escrow (30%)</div><div class="kpi" id="escrow">-</div></div>
        <div class="card"><div class="small muted">Contract PDF</div><div class="kpi">Ready</div></div>
      </div>
      <button class="primary top-space" id="submit">Confirm Booking Workflow</button>
      <div class="small top-space" id="msg"></div>`;

    const right = document.getElementById('right');
    function renderStatus(active = stages[0]) {
      right.innerHTML = `<h3>Booking Status Tracker</h3>${stages.map(s => `<div class="status-step ${s===active?'active':''}">${s}</div>`).join('')}`;
    }

    function renderQuote() {
      const percent = Number(document.getElementById('adjust').value);
      const quote = Math.round(celeb.startingPrice * (1 + percent/100));
      const escrow = Math.round(quote * 0.3);
      document.getElementById('quote').textContent = '$' + quote.toLocaleString();
      document.getElementById('escrow').textContent = '$' + escrow.toLocaleString();
      return percent;
    }

    renderStatus();
    renderQuote();
    document.getElementById('adjust').oninput = renderQuote;

    document.getElementById('submit').onclick = async () => {
      try {
        const pricingAdjustmentPercent = renderQuote();
        const booking = await request('/bookings/initiate', {
          method: 'POST',
          body: JSON.stringify({
            celebrityId: id,
            eventType: document.getElementById('eventType').value,
            date: document.getElementById('date').value,
            location: document.getElementById('location').value,
            ndaRequired: document.getElementById('ndaRequired').checked,
            securityLevel: document.getElementById('securityLevel').value,
            riderRequirements: document.getElementById('rider').value,
            pricingAdjustmentPercent
          })
        });
        renderStatus(booking.booking.status);
        document.getElementById('msg').textContent = `Booking created: ${booking.booking.id} | Contract: ${booking.booking.contractId}`;
      } catch (e) {
        document.getElementById('msg').textContent = e.message + ' (login first)';
      }
    };
  </script>
</body>
</html>

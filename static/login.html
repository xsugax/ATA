<!doctype html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ALL TALENTS Agency  Access</title>
<link rel="stylesheet" href="assets/styles.css"/>
<style>
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{width:100%;max-width:420px;padding:42px 36px;background:rgba(7,12,13,.92);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 60px rgba(13,148,136,.12)}
.ata-wordmark{font-size:28px;font-weight:900;letter-spacing:.1em;color:var(--plat);margin-bottom:4px}
.ata-wordmark span{color:var(--violet-bright)}
</style>
</head><body>
<div class="login-wrap">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:32px">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style="margin:0 auto 12px">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0d9488"/><stop offset="1" stop-color="#38bdf8"/></linearGradient></defs>
        <rect width="48" height="48" rx="14" fill="url(#lg)"/>
        <circle cx="24" cy="10.5" r="2.5" fill="rgba(255,255,255,0.65)"/>
        <text x="24" y="33" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="900" fill="white" letter-spacing="2">ATA</text>
      </svg>
      <div class="ata-wordmark">ALL <span>TALENTS</span></div>
      <div style="font-size:9px;letter-spacing:.35em;color:var(--plat-faint);text-transform:uppercase">Sovereign Access Portal</div>
    </div>
    <form id="login-form" style="display:flex;flex-direction:column;gap:14px">
      <label>Email<input id="email" type="email" placeholder="you@domain.com" required autocomplete="email"/></label>
      <label>Password<input id="pass" type="password" placeholder="" required autocomplete="current-password"/></label>
      <div id="err" style="font-size:12px;color:var(--red);display:none;padding:8px 12px;border-radius:8px;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2)"></div>
      <button type="submit" class="primary" id="login-btn" style="margin-top:6px">Sign In &#8594;</button>
    </form>
    <div style="margin-top:24px;padding-top:18px;border-top:1px solid var(--line-dim);font-size:11px;color:var(--plat-faint)">
      <div style="font-weight:700;color:var(--plat-dim);margin-bottom:8px">Demo Access</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <span class="badge-cyan badge" style="display:block;cursor:pointer" onclick="fillCreds('admin@aurelux.com','Admin@123')">&#9654; Admin: admin@aurelux.com / Admin@123</span>
        <span class="badge badge" style="display:block;cursor:pointer" onclick="fillCreds('client@aurelux.com','Client@123')">&#9654; Client: client@aurelux.com / Client@123</span>
        <span class="badge-gold badge" style="display:block;cursor:pointer" onclick="fillCreds('manager@aurelux.com','Manager@123')">&#9654; Manager: manager@aurelux.com / Manager@123</span>
      </div>
    </div>
  </div>
</div>
<script type="module">
import { request } from './assets/api.js';
window.fillCreds = (e,p) => { document.getElementById('email').value=e; document.getElementById('pass').value=p; };
document.getElementById('login-form').onsubmit = async (ev) => {
  ev.preventDefault();
  const err = document.getElementById('err');
  err.style.display='none';
  const btn = document.getElementById('login-btn');
  btn.textContent='Authenticating...'; btn.disabled=true;
  try {
    const r = await request('/auth/login',{method:'POST',body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('pass').value})});
    localStorage.setItem('aurelux_token',r.token);
    localStorage.setItem('aurelux_user',JSON.stringify(r.user));
    location.href = r.user.role==='admin' ? 'admin.html' : 'portal.html';
  } catch(e) {
    err.textContent=e.message; err.style.display='block';
    btn.textContent='Sign In '; btn.disabled=false;
  }
};
</script>
</body></html>

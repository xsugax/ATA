<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURELUX Sovereign - Access</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="container" id="app"></div>
  <script type="module">
    import { request, nav } from './assets/api.js';

    const app = document.getElementById('app');
    app.innerHTML = `${nav('login')}
      <section class="glass section card" style="max-width:720px;margin:20px auto;">
        <h2>Sovereign Access Gateway</h2>
        <p class="muted">Use seeded credentials to unlock role-based layers.</p>
        <div class="grid top-space">
          <input id="email" value="admin@aurelux.com" />
          <input id="password" type="password" value="Admin@123" />
          <button class="primary" id="login">Authenticate</button>
          <div id="status" class="small"></div>
          <div class="small muted">client@aurelux.com / Client@123 · manager@aurelux.com / Manager@123 · admin@aurelux.com / Admin@123</div>
        </div>
      </section>`;

    document.getElementById('login').onclick = async () => {
      try {
        const payload = await request('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          })
        });
        localStorage.setItem('aurelux_token', payload.token);
        localStorage.setItem('aurelux_user', JSON.stringify(payload.user));
        document.getElementById('status').textContent = `Authenticated as ${payload.user.role}`;
      } catch (e) {
        document.getElementById('status').textContent = e.message;
      }
    };
  </script>
</body>
</html>

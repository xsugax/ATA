<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070A14"/>
      <stop offset="50%" stop-color="#0C1120"/>
      <stop offset="100%" stop-color="#080D1A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BAD0EC"/>
      <stop offset="100%" stop-color="#6A8FAD"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3764B4" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#070A14" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94B4D8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#070A14" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="radGlow" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#3764B4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#070A14" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Atmospheric glows -->
  <ellipse cx="220" cy="200" rx="420" ry="320" fill="url(#radGlow)" filter="url(#blur)"/>
  <ellipse cx="1050" cy="120" rx="280" ry="240" fill="url(#glow2)" filter="url(#blur)"/>
  <ellipse cx="700" cy="580" rx="360" ry="180" fill="#1C3782" fill-opacity="0.14" filter="url(#blur)"/>

  <!-- Border frame -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#94B4D8" stroke-width="1" stroke-opacity="0.22"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" opacity="0.7"/>

  <!-- Vertical rule left -->
  <rect x="88" y="0" width="1" height="630" fill="#94B4D8" fill-opacity="0.07"/>

  <!-- Logo mark -->
  <rect x="56" y="54" width="56" height="56" rx="14" fill="#0C1120" stroke="#94B4D8" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="84" y="97" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="34" font-weight="800" fill="url(#accent)" text-anchor="middle">A</text>

  <!-- Agency name -->
  <text x="130" y="82" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#94B4D8" letter-spacing="3" opacity="0.9">All Talents Agency</text>
  <text x="130" y="100" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#E6ECF4" letter-spacing="2" opacity="0.45">SOVEREIGN REPRESENTATION PLATFORM</text>

  <!-- Live badge -->
  <rect x="56" y="148" width="148" height="26" rx="5" fill="#94B4D8" fill-opacity="0.08" stroke="#94B4D8" stroke-width="0.8" stroke-opacity="0.45"/>
  <circle cx="73" cy="161" r="4" fill="#9fe6b0"/>
  <text x="83" y="165.5" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="9.5" font-weight="700" fill="#9fe6b0" letter-spacing="2">LIVE ACCESS OPEN</text>

  <!-- Main headline -->
  <text x="56" y="270" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="72" font-weight="800" fill="#E6ECF4" letter-spacing="-2">Book Any</text>
  <text x="56" y="358" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="72" font-weight="800" fill="url(#accent)" letter-spacing="-2">Celebrity.</text>
  <text x="56" y="432" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="72" font-weight="800" fill="#E6ECF4" letter-spacing="-2">Privately.</text>

  <!-- Sub text -->
  <text x="56" y="498" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="18" font-weight="400" fill="#E6ECF4" opacity="0.55" letter-spacing="0.5">119+ verified A-list celebrities  ·  Direct representative access  ·  Zero-gap booking</text>

  <!-- Bottom bar -->
  <rect x="0" y="598" width="1200" height="32" fill="#0C1120" fill-opacity="0.8"/>
  <text x="56" y="619" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#94B4D8" letter-spacing="1.5" opacity="0.7">alltalents-agency.vercel.app</text>

  <!-- Right side — decorative stat blocks -->
  <rect x="820" y="140" width="320" height="360" rx="16" fill="#0C1120" fill-opacity="0.6" stroke="#94B4D8" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- Stat 1 -->
  <text x="860" y="200" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#94B4D8" letter-spacing="2" opacity="0.6">VERIFIED ROSTER</text>
  <text x="860" y="240" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="46" font-weight="800" fill="url(#accent)" letter-spacing="-1">119+</text>

  <rect x="840" y="260" width="280" height="1" fill="#94B4D8" fill-opacity="0.1"/>

  <!-- Stat 2 -->
  <text x="860" y="300" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#94B4D8" letter-spacing="2" opacity="0.6">AVERAGE RESPONSE</text>
  <text x="860" y="340" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="46" font-weight="800" fill="url(#accent)" letter-spacing="-1">48h</text>

  <rect x="840" y="356" width="280" height="1" fill="#94B4D8" fill-opacity="0.1"/>

  <!-- Stat 3 -->
  <text x="860" y="396" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#94B4D8" letter-spacing="2" opacity="0.6">CATEGORIES</text>
  <text x="860" y="436" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="46" font-weight="800" fill="url(#accent)" letter-spacing="-1">8</text>

  <rect x="840" y="452" width="280" height="1" fill="#94B4D8" fill-opacity="0.1"/>

  <!-- Stat 4 row -->
  <text x="860" y="484" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#E6ECF4" opacity="0.4" letter-spacing="1">Music · Film · Sports · K-Pop · Comedy</text>
</svg>

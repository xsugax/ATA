services:
  - type: web
    name: aurelux-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "https://www.alltalentsagency.com,https://alltalentsagency.com,https://alltalents-agency.vercel.app"
